<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fittium — Claim Your FREE Day Pass</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --red:#c0392b;--red-light:#e74c3c;--red-glow:#ff4757;
  --green:#1a7a4a;--green-light:#24a363;--green-glow:#2ecc71;
  --dark:#080808;--text:#0f0f0f;--muted:#666;--cream:#fafafa;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--dark);overflow-x:hidden;}

/* CHAT PAGE */
.chat-page{min-height:100vh;display:flex;flex-direction:column;background:linear-gradient(160deg,#080808 0%,#1a0505 100%);position:relative;overflow:hidden;}
.chat-page::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 65% 50% at 50% 30%,rgba(192,57,43,.08),transparent 70%);pointer-events:none;}

/* HEADER */
.chat-header{background:rgba(8,8,8,.95);backdrop-filter:blur(14px);border-bottom:1px solid rgba(192,57,43,.2);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:100;}
.header-logo{width:40px;height:40px;object-fit:contain;border-radius:50%;background:rgba(255,255,255,.05);padding:4px;}
.header-info h3{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:#fff;letter-spacing:.5px;}
.header-status{display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--green-glow);margin-top:2px;}
.status-dot{width:6px;height:6px;background:var(--green-glow);border-radius:50%;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.progress-wrap{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.progress-track{width:80px;height:4px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--red-light));border-radius:4px;transition:width .5s ease;width:0%;}
.progress-text{font-size:.62rem;color:rgba(255,255,255,.35);}

/* MESSAGES */
.messages{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth;}
.messages::-webkit-scrollbar{width:3px;}
.messages::-webkit-scrollbar-thumb{background:rgba(192,57,43,.3);border-radius:3px;}

/* BUBBLES */
.bubble{max-width:84%;animation:bubbleIn .35s ease both;}
@keyframes bubbleIn{from{opacity:0;transform:translateY(10px) scale(.97);}to{opacity:1;transform:none;}}
.bubble.bot{align-self:flex-start;}
.bubble.user{align-self:flex-end;}
.bubble.bot .bubble-inner{background:rgba(192,57,43,.8);color:#fff;border-radius:18px;border-bottom-left-radius:4px;padding:13px 18px;font-size:.9rem;line-height:1.6;border:1px solid rgba(192,57,43,.3);backdrop-filter:blur(8px);}
.bubble.user .bubble-inner{background:rgba(255,255,255,.1);color:#fff;border-radius:18px;border-bottom-right-radius:4px;padding:13px 18px;font-size:.9rem;line-height:1.6;border:1px solid rgba(255,255,255,.12);}

/* TYPING */
.typing{align-self:flex-start;animation:bubbleIn .3s ease;}
.typing-dots{background:rgba(192,57,43,.6);border:1px solid rgba(192,57,43,.3);padding:13px 18px;border-radius:18px;border-bottom-left-radius:4px;display:flex;gap:5px;align-items:center;}
.typing-dots span{width:7px;height:7px;background:rgba(255,255,255,.7);border-radius:50%;animation:typeDot 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes typeDot{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

/* ERROR BUBBLE */
.bubble.error .bubble-inner{background:rgba(255,71,87,.15);border:1px solid rgba(255,71,87,.4);color:#ff6b6b;}

/* INPUT AREA */
.input-area{padding:14px 16px 24px;flex-shrink:0;position:sticky;bottom:0;background:linear-gradient(to top,rgba(8,8,8,.95),transparent);backdrop-filter:blur(8px);}
.text-input-row{display:flex;gap:10px;align-items:center;}
.text-input{flex:1;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:50px;padding:13px 20px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s,background .2s;}
.text-input::placeholder{color:rgba(255,255,255,.3);}
.text-input:focus{border-color:var(--red-glow);background:rgba(192,57,43,.08);}
.text-input.valid{border-color:var(--green-glow);}
.text-input.invalid{border-color:#ff4757;}
.send-btn{width:48px;height:48px;background:linear-gradient(135deg,var(--red),var(--red-light));border:none;border-radius:50%;color:#fff;font-size:1.1rem;cursor:pointer;flex-shrink:0;transition:transform .2s,box-shadow .2s;display:flex;align-items:center;justify-content:center;}
.send-btn:hover{transform:scale(1.08);box-shadow:0 4px 16px rgba(192,57,43,.5);}
.choices{display:flex;flex-direction:column;gap:8px;}
.choice-btn{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.18);border-radius:14px;padding:13px 18px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.86rem;font-weight:500;cursor:pointer;text-align:left;transition:all .2s;}
.choice-btn:hover{background:rgba(192,57,43,.15);border-color:rgba(192,57,43,.5);transform:translateX(4px);}
.hidden{display:none!important;}

/* VALIDATION HINT */
.input-hint{font-size:.7rem;padding:5px 16px;margin-top:4px;}
.hint-error{color:#ff6b6b;}
.hint-success{color:var(--green-glow);}

/* ── COUPON CARD ── */
.coupon-wrap{align-self:center;width:96%;max-width:420px;animation:bubbleIn .5s ease both;margin:8px 0;}
.coupon-card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 12px 48px rgba(0,0,0,.5);}

/* Coupon Top — Red brand */
.c-top{background:linear-gradient(135deg,#1a0505,var(--red));padding:22px 24px;text-align:center;position:relative;}
.c-top-logo{width:52px;height:52px;object-fit:contain;background:rgba(255,255,255,.12);border-radius:50%;padding:6px;margin-bottom:10px;}
.c-brand{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;color:#fff;letter-spacing:3px;}
.c-brand span{color:#ffcccc;}
.c-tagline{font-size:.68rem;color:rgba(255,255,255,.7);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.c-badge{display:inline-block;background:rgba(255,255,255,.15);color:#fff;font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:5px 16px;border-radius:50px;margin-top:10px;border:1px solid rgba(255,255,255,.25);}

/* Coupon notch */
.c-notch{display:flex;align-items:center;margin:0 -1px;}
.c-notch-circle{width:20px;height:20px;background:var(--dark);border-radius:50%;flex-shrink:0;}
.c-notch-line{flex:1;border-top:2px dashed rgba(0,0,0,.12);}

/* Coupon Mid */
.c-mid{padding:20px 24px;}
.c-code-label{font-size:.6rem;color:#999;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.c-code{font-family:'Courier New',monospace;font-size:1.4rem;font-weight:700;color:var(--red);letter-spacing:4px;background:#fff5f5;border:1.5px dashed rgba(192,57,43,.3);border-radius:10px;padding:12px 16px;text-align:center;margin-bottom:16px;}
.c-rows{display:flex;flex-direction:column;gap:8px;}
.c-row{display:flex;align-items:flex-start;gap:10px;font-size:.82rem;color:#333;}
.c-icon{font-size:.9rem;flex-shrink:0;width:20px;}
.c-row strong{color:#111;}

/* Coupon Bottom */
.c-notch2{display:flex;align-items:center;margin:0 -1px;}
.c-notch2-circle{width:20px;height:20px;background:var(--dark);border-radius:50%;flex-shrink:0;}
.c-notch2-line{flex:1;border-top:2px dashed rgba(0,0,0,.12);}
.c-bottom{padding:14px 24px;background:#fff9f9;text-align:center;}
.c-validity{font-size:.72rem;color:#c0392b;font-weight:700;}
.c-validity-sub{font-size:.65rem;color:#999;margin-top:3px;}
.c-footer-logo{font-family:'Playfair Display',serif;font-size:.85rem;font-weight:700;color:#ccc;letter-spacing:2px;margin-top:6px;}
.c-footer-logo span{color:var(--red);}

/* ACTION BUTTONS */
.action-wrap{align-self:center;width:96%;max-width:420px;display:flex;flex-direction:column;gap:10px;animation:bubbleIn .4s ease both;}
.btn-wa{display:flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,#1a7a4a,#25d366);color:#fff;border:none;border-radius:14px;padding:16px 24px;font-family:'DM Sans',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;width:100%;transition:transform .2s,box-shadow .2s;box-shadow:0 6px 24px rgba(37,211,102,.3);text-decoration:none;}
.btn-wa:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(37,211,102,.45);}
.btn-wa svg{width:20px;height:20px;fill:#fff;flex-shrink:0;}
.btn-download{display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,var(--red),var(--red-light));color:#fff;border:none;border-radius:14px;padding:14px 24px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;width:100%;transition:transform .2s,box-shadow .2s;box-shadow:0 6px 20px rgba(192,57,43,.3);}
.btn-download:hover{transform:translateY(-2px);}
.btn-register{display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#1a3a5c,#2980b9);color:#fff;border:none;border-radius:14px;padding:14px 24px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;width:100%;transition:transform .2s,box-shadow .2s;box-shadow:0 6px 20px rgba(41,128,185,.3);}
.btn-register:hover{transform:translateY(-2px);}
.action-disc{color:rgba(255,255,255,.25);font-size:.65rem;text-align:center;line-height:1.5;margin-top:4px;}
.btn-restart{background:transparent;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.35);border-radius:50px;padding:8px 20px;font-family:'DM Sans',sans-serif;font-size:.72rem;cursor:pointer;margin:4px auto 0;display:block;transition:all .2s;}
.btn-restart:hover{color:#fff;border-color:rgba(255,255,255,.3);}

/* REGISTER CARD */
.register-bubble{align-self:flex-start;max-width:90%;background:rgba(41,128,185,.12);border:1px solid rgba(41,128,185,.3);border-radius:18px;border-bottom-left-radius:4px;padding:18px 20px;animation:bubbleIn .4s ease both;}
.register-bubble h4{color:#5dade2;font-size:.9rem;font-weight:700;margin-bottom:10px;}
.register-bubble p{color:rgba(255,255,255,.7);font-size:.8rem;line-height:1.6;}
.register-bubble ul{margin:10px 0 0 16px;color:rgba(255,255,255,.65);font-size:.78rem;line-height:1.8;}
</style>
</head>

// ── PROGRESS ──
function updateProgress(){

}

function scrollBottom(){ setTimeout(()=>msgs.scrollTop=msgs.scrollHeight,80); }

// ── BUBBLES ──
function addBot(html){ return new Promise(r=>{ setTimeout(()=>{ const d=document.createElement('div'); d.className='bubble bot'; d.innerHTML=`<div class="bubble-inner">${html}</div>`; msgs.appendChild(d); scrollBottom(); r(); },0); }); }
function addUser(text){ const d=document.createElement('div'); d.className='bubble user'; d.innerHTML=`<div class="bubble-inner">${text}</div>`; msgs.appendChild(d); scrollBottom(); }

function showTyping(){ const d=document.createElement('div'); d.className='typing'; d.id='typ'; d.innerHTML=`<div class="typing-dots"><span></span><span></span><span></span></div>`; msgs.appendChild(d); scrollBottom(); }
function hideTyping(){ const t=document.getElementById('typ'); if(t) t.remove(); }

// ── TYPE SEQUENCE ──
async function typeSeq(messages){
  for(let i=0;i<messages.length;i++){
    showTyping();
    await new Promise(r=>setTimeout(r, Math.min(300+messages[i].length*14,1200)));
    hideTyping();
    await addBot(messages[i]);
    if(i<messages.length-1) await new Promise(r=>setTimeout(r,150));
  }
}

function setHint(msg,type){ hintRow.innerHTML=`<div class="input-hint hint-${type}">${msg}</div>`; }

// ── VALIDATORS ──
function validateName(v){
  if(v.length<3) return {ok:false, msg:'Please enter your full name (minimum 3 characters)'};
  if(!/^[a-zA-Z\s]+$/.test(v)) return {ok:false, msg:'Name should contain only letters — please check spelling'};
  if(v.trim().split(' ').length < 2) return {ok:false, msg:'Please enter your FULL name (First + Last name) for successful registration'};
  return {ok:true, msg:'✓ Name looks good!'};
}

function validateMobile(v){
  const clean = v.replace(/\s+/g,'').replace(/^\+91/,'').replace(/^91/,'');
  if(!/^[6-9]\d{9}$/.test(clean)) return {ok:false, msg:'Please enter a valid 10-digit Indian mobile number starting with 6,7,8 or 9'};
  return {ok:true, msg:'✓ Valid mobile number', clean};
}

function validateEmail(v){
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) return {ok:false, msg:'Please enter a valid email address (e.g. yourname@gmail.com)'};
  if(v.length < 6) return {ok:false, msg:'Email address seems too short'};
  return {ok:true, msg:'✓ Valid email address'};
}

// ── LIVE VALIDATION ──
textInput.addEventListener('input', ()=>{
  const v = textInput.value.trim();
  if(!v) return;
  const s = steps[step];
  if(!s || !s.validate) return;
  const result = s.validate(v);
  if(result.ok){ textInput.classList.add('valid'); textInput.classList.remove('invalid'); setHint(result.msg,'success'); }
  else{ textInput.classList.remove('valid'); textInput.classList.add('invalid'); setHint(result.msg,'error'); }
});

// ── GENERATE COUPON CODE ──
function genCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = 'FIT-';
  for(let i=0;i<4;i++) code += chars[Math.floor(Math.random()*chars.length)];
  code += '-';
  for(let i=0;i<4;i++) code += chars[Math.floor(Math.random()*chars.length)];
  return code;
}

// ── SUBMIT TEXT ──
function submitText(){
  const val = textInput.value.trim();
  if(!val){ setHint('Please enter a value to continue','error'); return; }
  const s = steps[step];
  if(s.validate){
    const result = s.validate(val);
    if(!result.ok){ setHint(result.msg,'error'); textInput.classList.add('invalid'); return; }
    // Store cleaned value
    data[s.key] = result.clean || val;
    if(s.key==='name') data[s.key] = val; // keep original for name
  } else {
    data[s.key] = val;
  }
  addUser(val);
  step++; updateProgress();
  setTimeout(runStep,400);
}

// ── HANDLE CHOICE ──
function handleChoice(val){
  // Store current step key safely
  const currentStep = steps[step];
  if(currentStep && currentStep.key){
    data[currentStep.key] = val;
  }
  addUser(val);
  if(val.includes('Tell Me More')){
    step++;
    showMoreInfo();
    return;
  }
  if(val.includes('No Thanks')){
    data['consent'] = 'No Thanks';
    step = steps.length; // jump to final
    updateProgress();
    setTimeout(runFinal,400);
    return;
  }
  step++; updateProgress();
  setTimeout(runStep,400);
}

  showChoices(['✅ Yes! Register Me as Preferred Member','❌ No Thanks, Just the Coupon']);

  const lastStep = steps[step-1];
  if(lastStep) lastStep.key='consent';
}

// ── ENTER KEY ──
textInput.addEventListener('keydown',e=>{ if(e.key==='Enter') submitText(); });

// ── RUN STEP ──
async function runStep(){
  if(step >= steps.length){ runFinal(); return; }
  const s = steps[step];
  hideInput();
  await typeSeq(s.msgs.map(m=>m.replace(/\{(\w+)\}/g,(_,k)=>data[k]||'')));
  if(s.input==='text') showText(s.ph);
  else if(s.input==='choices') showChoices(s.opts);
}
